phase_timing_mode: strict
quality_target: 0.8
quality_targets:
- 0.8
repeats: 3
rpc_baseline_requests: 1000
s2_selectivities:
- 0.001
- 0.01
- 0.1
- 0.5
scenario: s2_filtered_ann
search_sweep:
- hnsw_ef: 128
seed: 42
sla_threshold_ms: 80.0
steady_state_s: 300
top_k: 10
vector_dim: 192
warmup_s: 120
