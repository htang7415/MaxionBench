adapter_options:
  healthcheck_timeout_s: 5.0
  host: ${MAXIONBENCH_OPENSEARCH_HOST:-127.0.0.1}
  port: ${MAXIONBENCH_OPENSEARCH_PORT:-9200}
  scheme: ${MAXIONBENCH_OPENSEARCH_SCHEME:-http}
  timeout_s: 30.0
  verify_ssl: false
clients_grid:
- 32
clients_read: 32
clients_write: 0
dataset_bundle: D3
dataset_hash: laion-subset-d3-10m
