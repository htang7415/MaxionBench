engine: mock
engine_version: "0.1.0"
scenario: s1_ann_frontier
dataset_bundle: D3
dataset_hash: laion-subset-d3-10m
dataset_path: ${MAXIONBENCH_D3_DATASET_PATH}
dataset_path_sha256: ${MAXIONBENCH_D3_DATASET_SHA256}
seed: 42
repeats: 3
no_retry: true
output_dir: artifacts/runs/paper/s1_ann_frontier_d3_mock
quality_target: 0.80
quality_targets: [0.80, 0.90, 0.95]
clients_read: 1
clients_write: 0
clients_grid: [1, 8, 32, 64]
search_sweep:
  - {hnsw_ef: 64}
  - {hnsw_ef: 128}
  - {hnsw_ef: 256}
warmup_s: 120
steady_state_s: 300
phase_timing_mode: strict
rpc_baseline_requests: 1000
sla_threshold_ms: 50.0
vector_dim: 192
num_vectors: 10000000
num_queries: 200
top_k: 10
