engine: qdrant
engine_version: "server"
adapter_options:
  host: ${MAXIONBENCH_QDRANT_HOST:-127.0.0.1}
  port: ${MAXIONBENCH_QDRANT_PORT:-6333}
  timeout_s: 30.0
scenario: s1_ann_frontier
dataset_bundle: D1
dataset_hash: ann-benchmarks-d1
# dataset_path: /path/to/ann-benchmarks.hdf5
seed: 42
repeats: 3
no_retry: true
output_dir: artifacts/runs/s1_ann_frontier_qdrant
quality_target: 0.8
quality_targets: [0.80, 0.90, 0.95]
clients_read: 1
clients_write: 0
clients_grid: [1, 8, 32, 64]
search_sweep:
  - {hnsw_ef: 64}
  - {hnsw_ef: 128}
  - {hnsw_ef: 256}
warmup_s: 120
steady_state_s: 300
rpc_baseline_requests: 1000
sla_threshold_ms: 50.0
vector_dim: 96
num_vectors: 100000
num_queries: 1000
top_k: 10
