engine: pgvector
engine_version: "postgres16-pgvector"
adapter_options:
  dsn: postgresql://postgres:postgres@127.0.0.1:5432/postgres
  schema: public
  connect_timeout_s: 10.0
scenario: s1_ann_frontier
dataset_bundle: D1
dataset_hash: ann-benchmarks-d1
# dataset_path: /path/to/ann-benchmarks.hdf5
seed: 42
repeats: 3
no_retry: true
output_dir: artifacts/runs/s1_ann_frontier_pgvector
quality_target: 0.8
quality_targets: [0.80, 0.90, 0.95]
clients_read: 1
clients_write: 0
clients_grid: [1, 8, 32, 64]
search_sweep:
  - {ivfflat_probes: 4}
  - {ivfflat_probes: 8}
  - {ivfflat_probes: 16}
warmup_s: 120
steady_state_s: 300
rpc_baseline_requests: 1000
sla_threshold_ms: 50.0
vector_dim: 96
num_vectors: 100000
num_queries: 1000
top_k: 10
