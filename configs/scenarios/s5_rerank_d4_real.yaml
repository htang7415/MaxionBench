engine: mock
engine_version: "0.1.0"
scenario: s5_rerank
dataset_bundle: D4
dataset_hash: d4-local-bundles-v1
seed: 42
repeats: 3
no_retry: true
output_dir: artifacts/runs/s5_rerank_d4_real_mock
quality_target: 0.35
clients_read: 16
clients_write: 0
clients_grid: [16]
warmup_s: 120
steady_state_s: 300
rpc_baseline_requests: 1000
sla_threshold_ms: 300.0
vector_dim: 64
num_vectors: 5000
num_queries: 200
top_k: 10
s5_candidate_budgets: [50, 200, 1000]
s5_reranker_model_id: BAAI/bge-reranker-base
s5_reranker_revision_tag: "2026-03-04"
s5_reranker_max_seq_len: 512
s5_reranker_precision: fp16
s5_reranker_batch_size: 32
s5_reranker_truncation: right
s5_require_hf_backend: true
d4_use_real_data: true
d4_beir_root: data/beir
d4_beir_subsets:
  - trec-covid
  - nfcorpus
  - fiqa
  - scifact
  - hotpotqa
d4_beir_split: test
d4_crag_source: facebookresearch/CRAG
d4_crag_path: data/crag_task_1_and_2_dev_v4.jsonl.bz2
d4_crag_sha256: ${MAXIONBENCH_D4_CRAG_SHA256}
d4_include_crag: true
d4_max_docs: 200000
d4_max_queries: 5000
