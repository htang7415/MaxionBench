engine: mock
engine_version: "0.1.0"
scenario: s1_ann_frontier
dataset_bundle: D1
dataset_hash: synthetic-d1-v1
seed: 42
repeats: 3
no_retry: true
output_dir: artifacts/runs/s1_ann_frontier_mock
quality_target: 0.8
quality_targets: [0.80, 0.90, 0.95]
clients_read: 1
clients_write: 0
clients_grid: [1, 8, 32, 64]
search_sweep:
  - {hnsw_ef: 64}
  - {hnsw_ef: 128}
  - {hnsw_ef: 256}
warmup_s: 120
steady_state_s: 300
rpc_baseline_requests: 1000
sla_threshold_ms: 50.0
vector_dim: 64
num_vectors: 5000
num_queries: 200
top_k: 10
# dataset_path: /path/to/ann-benchmarks.hdf5

# RHU normalization pins
c_ref_vcpu: 96.0
g_ref_gpu: 1.0
r_ref_gib: 512.0
d_ref_tb: 7.68
w_c: 0.25
w_g: 0.25
w_r: 0.25
w_d: 0.25
