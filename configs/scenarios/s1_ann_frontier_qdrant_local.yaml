engine: qdrant
engine_version: local
adapter_options:
  location: ":memory:"
scenario: s1_ann_frontier
dataset_bundle: D1
dataset_hash: synthetic-d1-local
seed: 42
repeats: 1
no_retry: true
output_dir: artifacts/runs/s1_ann_frontier_qdrant_local
quality_target: 0.8
quality_targets: [0.8, 0.9, 0.95]
clients_read: 1
clients_write: 0
clients_grid: [1, 8, 32, 64]
search_sweep:
  - {hnsw_ef: 64}
  - {hnsw_ef: 128}
  - {hnsw_ef: 256}
warmup_s: 120
steady_state_s: 300
rpc_baseline_requests: 1000
sla_threshold_ms: 50.0
vector_dim: 64
num_vectors: 5000
num_queries: 200
top_k: 10
