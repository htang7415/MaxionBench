engine: mock
engine_version: "0.1.0"
scenario: s1_ann_frontier
dataset_bundle: D2
dataset_hash: bigann-10m
# d2_base_fvecs_path: /path/to/base.fvecs
# d2_query_fvecs_path: /path/to/query.fvecs
# d2_gt_ivecs_path: /path/to/gt.ivecs
seed: 42
repeats: 3
no_retry: true
output_dir: artifacts/runs/s1_ann_frontier_d2_mock
quality_target: 0.8
quality_targets: [0.80, 0.90, 0.95]
clients_read: 1
clients_write: 0
clients_grid: [1, 8, 32, 64]
search_sweep:
  - {hnsw_ef: 64}
  - {hnsw_ef: 128}
  - {hnsw_ef: 256}
warmup_s: 120
steady_state_s: 300
rpc_baseline_requests: 1000
sla_threshold_ms: 50.0
vector_dim: 128
num_vectors: 10000000
num_queries: 10000
top_k: 10
