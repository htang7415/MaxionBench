engine: opensearch
engine_version: "2.x"
adapter_options:
  host: 127.0.0.1
  port: 9200
  scheme: http
  timeout_s: 30.0
  verify_ssl: false
scenario: s1_ann_frontier
dataset_bundle: D1
dataset_hash: ann-benchmarks-d1
seed: 42
repeats: 3
no_retry: true
output_dir: artifacts/runs/s1_ann_frontier_opensearch
quality_target: 0.8
quality_targets: [0.80, 0.90, 0.95]
clients_read: 1
clients_write: 0
clients_grid: [1, 8, 32, 64]
search_sweep:
  - {}
warmup_s: 120
steady_state_s: 300
rpc_baseline_requests: 1000
sla_threshold_ms: 50.0
vector_dim: 96
num_vectors: 100000
num_queries: 1000
top_k: 10
