engine: lancedb-service
engine_version: "service"
adapter_options:
  base_url: http://127.0.0.1:18080
  timeout_s: 30.0
scenario: s1_ann_frontier
dataset_bundle: D1
dataset_hash: synthetic-d1-lancedb-service
seed: 42
repeats: 1
no_retry: true
output_dir: artifacts/runs/s1_ann_frontier_lancedb_service
quality_target: 0.8
quality_targets: [0.80, 0.90, 0.95]
clients_read: 1
clients_write: 0
clients_grid: [1, 8, 32, 64]
search_sweep:
  - {}
warmup_s: 120
steady_state_s: 300
rpc_baseline_requests: 1000
sla_threshold_ms: 50.0
vector_dim: 64
num_vectors: 5000
num_queries: 200
top_k: 10
