engine: weaviate
engine_version: "1.x"
adapter_options:
  host: ${MAXIONBENCH_WEAVIATE_HOST:-127.0.0.1}
  port: ${MAXIONBENCH_WEAVIATE_PORT:-8080}
  scheme: ${MAXIONBENCH_WEAVIATE_SCHEME:-http}
  timeout_s: 30.0
scenario: s1_ann_frontier
dataset_bundle: D1
dataset_hash: ann-benchmarks-d1
seed: 42
repeats: 3
no_retry: true
output_dir: artifacts/runs/s1_ann_frontier_weaviate
quality_target: 0.8
quality_targets: [0.80, 0.90, 0.95]
clients_read: 1
clients_write: 0
clients_grid: [1, 8, 32, 64]
search_sweep:
  - {}
warmup_s: 120
steady_state_s: 300
rpc_baseline_requests: 1000
sla_threshold_ms: 50.0
vector_dim: 96
num_vectors: 100000
num_queries: 1000
top_k: 10
