cluster_a_apptainer:
  base:
    - ["--job-name", "maxion"]
    - ["--output", "logs/%x_%j.out"]
    - ["--error", "logs/%x_%j.err"]
    - ["--nodes", "1"]
    - ["--ntasks-per-node", "1"]
    - ["--cpus-per-task", "96"]
    - ["--mem", "512G"]
    - ["--time", "2-00:00:00"]
    - ["--account", "${MAXIONBENCH_SLURM_ACCOUNT}"]
  step_overrides:
    download_datasets:
      - ["--cpus-per-task", "4"]
      - ["--mem", "32G"]
      - ["--time", "04:00:00"]
    preprocess_datasets:
      - ["--cpus-per-task", "32"]
      - ["--mem", "128G"]
      - ["--time", "08:00:00"]
    conformance:
      - ["--gres", "gpu:1"]
    calibrate:
      - ["--gres", "gpu:1"]
    gpu_all:
      - ["--gres", "gpu:1"]
    postprocess:
      - ["--cpus-per-task", "8"]
      - ["--mem", "64G"]
      - ["--time", "01:00:00"]

