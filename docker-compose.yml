services:
  benchmark:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      PYTHONPATH: /workspace
      MAXIONBENCH_QDRANT_HOST: qdrant
      MAXIONBENCH_MILVUS_HOST: milvus
      MAXIONBENCH_OPENSEARCH_HOST: opensearch
      MAXIONBENCH_PGVECTOR_DSN: postgresql://postgres:postgres@pgvector:5432/postgres
      MAXIONBENCH_WEAVIATE_HOST: weaviate
      MAXIONBENCH_LANCEDB_SERVICE_INPROC_URI: /workspace/artifacts/lancedb/service

  benchmark-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      PYTHONPATH: /workspace
      MAXIONBENCH_QDRANT_HOST: qdrant
      MAXIONBENCH_MILVUS_HOST: milvus
      MAXIONBENCH_OPENSEARCH_HOST: opensearch
      MAXIONBENCH_PGVECTOR_DSN: postgresql://postgres:postgres@pgvector:5432/postgres
      MAXIONBENCH_WEAVIATE_HOST: weaviate
      MAXIONBENCH_LANCEDB_SERVICE_INPROC_URI: /workspace/artifacts/lancedb/service
      NVIDIA_VISIBLE_DEVICES: all
    gpus: all

  qdrant:
    image: ${MAXIONBENCH_QDRANT_IMAGE:-qdrant/qdrant:v1.17.1}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  pgvector:
    image: ${MAXIONBENCH_PGVECTOR_IMAGE:-pgvector/pgvector:0.8.2-pg16-trixie}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    expose:
      - "5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  opensearch:
    image: ${MAXIONBENCH_OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.11.1}
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - "${MAXIONBENCH_OPENSEARCH_DATA_DIR:-./artifacts/containers/opensearch_data}:/usr/share/opensearch/data"

  weaviate:
    image: ${MAXIONBENCH_WEAVIATE_IMAGE:-cr.weaviate.io/semitechnologies/weaviate:1.30.6}
    environment:
      QUERY_DEFAULTS_LIMIT: "20"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    ports:
      - "8080:8080"
    volumes:
      - weaviate_data:/var/lib/weaviate

  milvus-etcd:
    image: ${MAXIONBENCH_MILVUS_ETCD_IMAGE:-quay.io/coreos/etcd:v3.5.18}
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - -advertise-client-urls=http://milvus-etcd:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - milvus_etcd:/etcd

  milvus-minio:
    image: ${MAXIONBENCH_MILVUS_MINIO_IMAGE:-minio/minio:RELEASE.2024-11-07T00-52-20Z}
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /minio_data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - milvus_minio:/minio_data

  milvus:
    image: ${MAXIONBENCH_MILVUS_IMAGE:-milvusdb/milvus:v2.5.27}
    command: ["milvus", "run", "standalone"]
    depends_on:
      - milvus-etcd
      - milvus-minio
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus

volumes:
  qdrant_storage:
  pgvector_data:
  weaviate_data:
  milvus_etcd:
  milvus_minio:
  milvus_data:
