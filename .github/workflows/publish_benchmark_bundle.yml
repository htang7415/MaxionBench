name: publish-benchmark-bundle

on:
  workflow_dispatch:
    inputs:
      conformance_config_dir:
        description: "Conformance config directory"
        required: false
        default: "configs/conformance"
      timeout_s:
        description: "Per-adapter conformance timeout in seconds"
        required: false
        default: "300"
      allow_gpu_unavailable:
        description: "Allow missing/non-pass faiss-gpu readiness"
        required: false
        default: "true"
      results_dir:
        description: "Benchmark results directory to package"
        required: false
        default: "artifacts/runs"
      figures_dir:
        description: "Benchmark figures directory to package"
        required: false
        default: "artifacts/figures"
      bundle_name:
        description: "Promotion bundle artifact name"
        required: false
        default: "benchmark-result-bundle"

jobs:
  strict_readiness_proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,engines]"

      - name: Verify conformance config catalog
        run: |
          ARGS=( \
            --config-dir "${{ inputs.conformance_config_dir }}" \
            --json \
          )
          if [[ "${{ inputs.allow_gpu_unavailable }}" == "true" ]]; then
            ARGS+=(--allow-gpu-unavailable)
          fi
          maxionbench verify-conformance-configs "${ARGS[@]}"

      - name: Run conformance matrix for promotion proof
        run: |
          maxionbench conformance-matrix \
            --config-dir "${{ inputs.conformance_config_dir }}" \
            --out-dir artifacts/conformance_publish \
            --timeout-s "${{ inputs.timeout_s }}"

      - name: Verify strict engine readiness for promotion proof
        run: |
          mkdir -p artifacts/conformance_publish
          ARGS=( \
            --conformance-matrix artifacts/conformance_publish/conformance_matrix.csv \
            --behavior-dir docs/behavior \
            --require-mock-pass \
            --json \
          )
          if [[ "${{ inputs.allow_gpu_unavailable }}" == "true" ]]; then
            ARGS+=(--allow-gpu-unavailable)
          fi
          maxionbench verify-engine-readiness "${ARGS[@]}" | tee artifacts/conformance_publish/engine_readiness_summary.json

      - name: Upload strict readiness proof artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-readiness-proof
          if-no-files-found: error
          retention-days: 14
          path: |
            artifacts/conformance_publish/conformance_matrix.csv
            artifacts/conformance_publish/engine_readiness_summary.json

  publish_result_bundle:
    needs: strict_readiness_proof
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Download strict readiness proof artifact
        uses: actions/download-artifact@v4
        with:
          name: strict-readiness-proof
          path: artifacts/promotion

      - name: Verify promotion gate
        run: |
          maxionbench verify-promotion-gate \
            --strict-readiness-summary artifacts/promotion/engine_readiness_summary.json \
            --json

      - name: Assert benchmark artifact directories exist
        run: |
          test -d "${{ inputs.results_dir }}"
          test -d "${{ inputs.figures_dir }}"

      - name: Build benchmark promotion bundle
        run: |
          mkdir -p artifacts/promotion
          tar -czf artifacts/promotion/benchmark_result_bundle.tgz \
            "${{ inputs.results_dir }}" \
            "${{ inputs.figures_dir }}"

      - name: Upload promotion bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.bundle_name }}
          if-no-files-found: error
          retention-days: 14
          path: |
            artifacts/promotion/benchmark_result_bundle.tgz
            artifacts/promotion/engine_readiness_summary.json
