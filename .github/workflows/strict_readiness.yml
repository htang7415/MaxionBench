name: strict-readiness

on:
  workflow_dispatch:
    inputs:
      conformance_config_dir:
        description: "Conformance config directory"
        required: false
        default: "configs/conformance"
      scenario_config_dir:
        description: "Scenario config directory for pin verification"
        required: false
        default: "configs/scenarios"
      timeout_s:
        description: "Per-adapter conformance timeout in seconds"
        required: false
        default: "300"
      allow_gpu_unavailable:
        description: "Allow missing/non-pass faiss-gpu readiness"
        required: false
        default: "true"
      strict_d3_scenario_scale:
        description: "Require D3 scenarios to use num_vectors >= 10M during pin verification"
        required: false
        default: "false"
      require_paper_d3_calibration:
        description: "Require d3_params.yaml to pass strict paper calibration checks"
        required: false
        default: "false"
      d3_params_path:
        description: "Path to D3 calibration params file used for optional strict calibration gate"
        required: false
        default: "artifacts/calibration/d3_params.yaml"

jobs:
  strict_readiness_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,engines]"

      - name: Verify pinned scenario configs
        run: |
          ARGS=( \
            --config-dir "${{ inputs.scenario_config_dir }}" \
            --json \
          )
          if [[ "${{ inputs.strict_d3_scenario_scale }}" == "true" ]]; then
            ARGS+=(--strict-d3-scenario-scale)
          fi
          maxionbench verify-pins "${ARGS[@]}"

      - name: Verify D3 calibration params (optional strict gate)
        if: ${{ inputs.require_paper_d3_calibration == 'true' }}
        run: |
          maxionbench verify-d3-calibration \
            --d3-params "${{ inputs.d3_params_path }}" \
            --strict \
            --json

      - name: Verify conformance config catalog
        run: |
          ARGS=( \
            --config-dir "${{ inputs.conformance_config_dir }}" \
            --json \
          )
          if [[ "${{ inputs.allow_gpu_unavailable }}" == "true" ]]; then
            ARGS+=(--allow-gpu-unavailable)
          fi
          maxionbench verify-conformance-configs "${ARGS[@]}"

      - name: Run strict conformance matrix
        run: |
          maxionbench conformance-matrix \
            --config-dir "${{ inputs.conformance_config_dir }}" \
            --out-dir artifacts/conformance_strict \
            --timeout-s "${{ inputs.timeout_s }}"

      - name: Verify strict engine readiness policy
        run: |
          mkdir -p artifacts/conformance_strict
          ARGS=( \
            --conformance-matrix artifacts/conformance_strict/conformance_matrix.csv \
            --behavior-dir docs/behavior \
            --require-mock-pass \
            --json \
          )
          if [[ "${{ inputs.allow_gpu_unavailable }}" == "true" ]]; then
            ARGS+=(--allow-gpu-unavailable)
          fi
          maxionbench verify-engine-readiness "${ARGS[@]}" | tee artifacts/conformance_strict/engine_readiness_summary.json

      - name: Upload strict readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-readiness-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            artifacts/conformance_strict/**
