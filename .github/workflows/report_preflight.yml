name: report-preflight

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  conformance_readiness_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify conformance config catalog
        run: |
          maxionbench verify-conformance-configs --config-dir configs/conformance --json

      - name: Run conformance matrix (structural readiness)
        run: |
          maxionbench conformance-matrix \
            --config-dir configs/conformance \
            --out-dir artifacts/conformance \
            --timeout-s 30

      - name: Verify engine readiness coverage (non-pass statuses allowed)
        run: |
          maxionbench verify-engine-readiness \
            --conformance-matrix artifacts/conformance/conformance_matrix.csv \
            --behavior-dir docs/behavior \
            --allow-nonpass-status \
            --require-mock-pass \
            --json

      - name: Upload conformance readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-readiness-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            artifacts/conformance/**

  report_preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,reporting]"

      - name: Verify pinned scenario configs
        run: |
          maxionbench verify-pins --config-dir configs/scenarios_portable --json

      - name: Verify dataset manifests
        run: |
          maxionbench verify-dataset-manifests --manifest-dir maxionbench/datasets/manifests --json

      - name: Verify behavior cards
        run: |
          maxionbench verify-behavior-cards --behavior-dir docs/behavior --json

      - name: Verify conformance config catalog
        run: |
          maxionbench verify-conformance-configs --config-dir configs/conformance --json

      - name: Verify repository hygiene
        run: |
          pytest -q tests/test_repo_hygiene.py

      - name: Verify command docs consistency
        run: |
          pytest -q tests/test_command_docs.py

      - name: Verify migration docs index
        run: |
          pytest -q tests/test_migration_docs.py

      - name: Build portable matrix
        run: |
          mkdir -p artifacts/ci/portable_matrix
          python -m maxionbench.orchestration.run_matrix \
            --scenario-config-dir configs/scenarios_portable \
            --engine-config-dir configs/engines_portable \
            --out-dir artifacts/ci/portable_matrix \
            --output-root artifacts/runs/portable_ci_matrix \
            --budget b0 \
            --lane cpu \
            --json | tee artifacts/ci/portable_matrix/summary.json

      - name: Write required checks snapshot
        run: |
          maxionbench snapshot-required-checks \
            --output artifacts/ci/required_checks_snapshot.json \
            --strict \
            --json

      - name: Upload preflight artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-preflight-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            artifacts/ci/required_checks_snapshot.json
            artifacts/ci/portable_matrix/**
