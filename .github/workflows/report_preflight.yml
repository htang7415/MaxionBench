name: report-preflight

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  conformance_readiness_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify conformance config catalog
        run: |
          maxionbench verify-conformance-configs --config-dir configs/conformance --allow-gpu-unavailable --json

      - name: Run conformance matrix (structural readiness)
        run: |
          maxionbench conformance-matrix \
            --config-dir configs/conformance \
            --out-dir artifacts/conformance \
            --timeout-s 30

      - name: Verify engine readiness coverage (non-pass statuses allowed)
        run: |
          maxionbench verify-engine-readiness \
            --conformance-matrix artifacts/conformance/conformance_matrix.csv \
            --behavior-dir docs/behavior \
            --allow-gpu-unavailable \
            --allow-nonpass-status \
            --require-mock-pass \
            --json

      - name: Upload conformance readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-readiness-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            artifacts/conformance/**

  report_preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,reporting]"

      - name: Verify pinned scenario configs
        run: |
          maxionbench verify-pins --config-dir configs/scenarios --json

      - name: Verify pinned paper scenario configs
        run: |
          maxionbench verify-pins --config-dir configs/scenarios_paper --strict-d3-scenario-scale --json

      - name: Verify dataset manifests
        run: |
          maxionbench verify-dataset-manifests --manifest-dir maxionbench/datasets/manifests --json

      - name: Verify behavior cards
        run: |
          maxionbench verify-behavior-cards --behavior-dir docs/behavior --json

      - name: Verify conformance config catalog
        run: |
          maxionbench verify-conformance-configs --config-dir configs/conformance --allow-gpu-unavailable --json

      - name: Verify repository hygiene
        run: |
          pytest -q tests/test_repo_hygiene.py

      - name: Verify command docs consistency
        run: |
          pytest -q tests/test_command_docs.py

      - name: Verify workstation assets
        run: |
          pytest -q tests/test_workstation_script.py tests/test_docker_workflow_files.py

      - name: Verify report figure policy sync
        run: |
          pytest -q tests/test_report_figure_policy_sync.py

      - name: Verify migration docs index
        run: |
          pytest -q tests/test_migration_docs.py

      - name: Verify branch protection policy sync
        run: |
          pytest -q tests/test_branch_protection_policy_sync.py

      - name: Build workstation CPU matrix
        run: |
          mkdir -p artifacts/ci/workstation_cpu_matrix
          python -m maxionbench.orchestration.run_matrix \
            --scenario-config-dir configs/scenarios_paper \
            --engine-config-dir configs/engines \
            --out-dir artifacts/ci/workstation_cpu_matrix \
            --output-root artifacts/runs/paper_cpu_matrix \
            --lane cpu \
            --json | tee artifacts/ci/workstation_cpu_matrix/summary.json

      - name: Build workstation GPU matrix
        run: |
          mkdir -p artifacts/ci/workstation_gpu_matrix
          python -m maxionbench.orchestration.run_matrix \
            --scenario-config-dir configs/scenarios_paper \
            --engine-config-dir configs/engines \
            --out-dir artifacts/ci/workstation_gpu_matrix \
            --output-root artifacts/runs/paper_gpu_matrix \
            --lane gpu \
            --json | tee artifacts/ci/workstation_gpu_matrix/summary.json

      - name: Write required checks snapshot
        run: |
          maxionbench snapshot-required-checks \
            --output artifacts/ci/required_checks_snapshot.json \
            --strict \
            --json

      - name: Write smoke scenario config
        run: |
          cat > ci_s1_smoke.yaml <<'YAML'
          engine: mock
          engine_version: "0.1.0"
          scenario: s1_ann_frontier
          dataset_bundle: D1
          dataset_hash: synthetic-d1-v1
          seed: 17
          repeats: 1
          no_retry: true
          output_dir: artifacts/runs/ci_preflight
          quality_target: 0.8
          quality_targets: [0.8]
          clients_read: 1
          clients_write: 0
          clients_grid: [1]
          search_sweep:
            - {hnsw_ef: 32}
          rpc_baseline_requests: 5
          sla_threshold_ms: 50.0
          vector_dim: 12
          num_vectors: 120
          num_queries: 8
          top_k: 10
          warmup_s: 0.02
          steady_state_s: 0.02
          phase_timing_mode: strict
          phase_max_requests_per_phase: 12
          YAML

      - name: Run pre-run readiness gate
        run: |
          maxionbench pre-run-gate --config ci_s1_smoke.yaml --json

      - name: Generate smoke run artifacts
        run: |
          maxionbench run \
            --config ci_s1_smoke.yaml \
            --seed 17 \
            --repeats 1 \
            --no-retry \
            --output-dir artifacts/runs/ci_preflight

      - name: Validate artifacts preflight
        run: |
          maxionbench validate --input artifacts/runs/ci_preflight --strict-schema --json

      - name: Generate report bundle
        run: |
          maxionbench report \
            --input artifacts/runs/ci_preflight \
            --mode milestones \
            --out artifacts/figures/ci_preflight

      - name: Inspect report output-policy sidecars
        run: |
          maxionbench inspect-report-output-policy \
            --input artifacts/figures/ci_preflight \
            --output artifacts/ci/report_output_policy_summary.json \
            --strict \
            --json

      - name: Assert report outputs
        run: |
          test -f artifacts/figures/ci_preflight/m2_runner_stage_timing.png
          test -f artifacts/figures/ci_preflight/T1_environment_runtime_pinning.csv

      - name: Upload preflight artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-preflight-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            ci_s1_smoke.yaml
            artifacts/ci/required_checks_snapshot.json
            artifacts/ci/report_output_policy_summary.json
            artifacts/ci/workstation_cpu_matrix/**
            artifacts/ci/workstation_gpu_matrix/**
            artifacts/runs/ci_preflight/**
            artifacts/figures/ci_preflight/**

  legacy_migration_path:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,reporting]"

      - name: Write legacy scenario config
        run: |
          cat > ci_s1_legacy.yaml <<'YAML'
          engine: mock
          engine_version: "0.1.0"
          scenario: s1_ann_frontier
          dataset_bundle: D1
          dataset_hash: synthetic-d1-v1
          seed: 23
          repeats: 1
          no_retry: true
          output_dir: artifacts/runs/ci_legacy
          quality_target: 0.8
          quality_targets: [0.8]
          clients_read: 1
          clients_write: 0
          clients_grid: [1]
          search_sweep:
            - {hnsw_ef: 32}
          rpc_baseline_requests: 5
          sla_threshold_ms: 50.0
          vector_dim: 12
          num_vectors: 120
          num_queries: 8
          top_k: 10
          warmup_s: 0.02
          steady_state_s: 0.02
          phase_timing_mode: strict
          phase_max_requests_per_phase: 12
          YAML

      - name: Generate legacy smoke run artifacts
        run: |
          maxionbench run \
            --config ci_s1_legacy.yaml \
            --seed 23 \
            --repeats 1 \
            --no-retry \
            --output-dir artifacts/runs/ci_legacy

      - name: Drop stage timing fields to emulate legacy artifact
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          path = Path("artifacts/runs/ci_legacy/results.parquet")
          frame = pd.read_parquet(path)
          frame = frame.drop(columns=["setup_elapsed_s", "warmup_elapsed_s", "measure_elapsed_s", "export_elapsed_s"])
          frame.to_parquet(path, index=False)
          PY

      - name: Assert report fails before migration
        run: |
          set +e
          output="$(maxionbench report --input artifacts/runs/ci_legacy --mode milestones --out artifacts/figures/ci_legacy 2>&1)"
          status=$?
          set -e
          if [[ "${status}" -eq 0 ]]; then
            echo "Expected report command to fail for legacy artifact"
            exit 1
          fi
          echo "${output}" | grep -q "migrate-stage-timing"

      - name: Backfill stage timing fields
        run: |
          maxionbench migrate-stage-timing --input artifacts/runs/ci_legacy

      - name: Validate migrated artifacts
        run: |
          maxionbench validate --input artifacts/runs/ci_legacy --strict-schema --json

      - name: Generate report after migration
        run: |
          maxionbench report \
            --input artifacts/runs/ci_legacy \
            --mode milestones \
            --out artifacts/figures/ci_legacy

      - name: Assert migrated report outputs
        run: |
          test -f artifacts/figures/ci_legacy/m2_runner_stage_timing.png
          test -f artifacts/figures/ci_legacy/T1_environment_runtime_pinning.csv

      - name: Upload legacy migration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-legacy-migration-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            ci_s1_legacy.yaml
            artifacts/runs/ci_legacy/**
            artifacts/figures/ci_legacy/**

  legacy_resource_profile_path:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,reporting]"

      - name: Write legacy resource scenario config
        run: |
          cat > ci_s1_legacy_resource.yaml <<'YAML'
          engine: mock
          engine_version: "0.1.0"
          scenario: s1_ann_frontier
          dataset_bundle: D1
          dataset_hash: synthetic-d1-v1
          seed: 31
          repeats: 1
          no_retry: true
          output_dir: artifacts/runs/ci_legacy_resource
          quality_target: 0.8
          quality_targets: [0.8]
          clients_read: 1
          clients_write: 0
          clients_grid: [1]
          search_sweep:
            - {hnsw_ef: 32}
          rpc_baseline_requests: 5
          sla_threshold_ms: 50.0
          vector_dim: 12
          num_vectors: 120
          num_queries: 8
          top_k: 10
          warmup_s: 0.02
          steady_state_s: 0.02
          phase_timing_mode: strict
          phase_max_requests_per_phase: 12
          YAML

      - name: Generate legacy resource smoke run artifacts
        run: |
          maxionbench run \
            --config ci_s1_legacy_resource.yaml \
            --seed 31 \
            --repeats 1 \
            --no-retry \
            --output-dir artifacts/runs/ci_legacy_resource

      - name: Drop RHU resource fields to emulate legacy artifact
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import pandas as pd

          run_dir = Path("artifacts/runs/ci_legacy_resource")
          results_path = run_dir / "results.parquet"
          frame = pd.read_parquet(results_path)
          frame = frame.drop(columns=["resource_cpu_vcpu", "resource_gpu_count", "resource_ram_gib", "resource_disk_tb", "rhu_rate"])
          frame.to_parquet(results_path, index=False)

          metadata_path = run_dir / "run_metadata.json"
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          metadata.pop("resource_profile", None)
          metadata.pop("rhu_references", None)
          metadata_path.write_text(json.dumps(metadata, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Assert strict validation fails for legacy resource artifact
        run: |
          set +e
          output="$(maxionbench validate --input artifacts/runs/ci_legacy_resource --strict-schema --json 2>&1)"
          status=$?
          set -e
          if [[ "${status}" -eq 0 ]]; then
            echo "Expected strict validation to fail for legacy resource artifact"
            exit 1
          fi
          echo "${output}" | grep -q "missing resource columns"

      - name: Capture legacy-compatible validation warnings
        run: |
          maxionbench validate --input artifacts/runs/ci_legacy_resource --legacy-ok --json \
            > artifacts/runs/ci_legacy_resource/legacy_ok_validate.json
          cat artifacts/runs/ci_legacy_resource/legacy_ok_validate.json

      - name: Assert report fails before regeneration
        run: |
          set +e
          output="$(maxionbench report --input artifacts/runs/ci_legacy_resource --mode milestones --out artifacts/figures/ci_legacy_resource 2>&1)"
          status=$?
          set -e
          if [[ "${status}" -eq 0 ]]; then
            echo "Expected report command to fail for legacy resource artifact"
            exit 1
          fi
          echo "${output}" | grep -q "RHU resource profile"

      - name: Upload legacy resource artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-legacy-resource-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            ci_s1_legacy_resource.yaml
            artifacts/runs/ci_legacy_resource/**
            artifacts/figures/ci_legacy_resource/**

  legacy_ground_truth_metadata_path:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,reporting]"

      - name: Write legacy ground-truth scenario config
        run: |
          cat > ci_s1_legacy_ground_truth.yaml <<'YAML'
          engine: mock
          engine_version: "0.1.0"
          scenario: s1_ann_frontier
          dataset_bundle: D1
          dataset_hash: synthetic-d1-v1
          seed: 41
          repeats: 1
          no_retry: true
          output_dir: artifacts/runs/ci_legacy_ground_truth
          quality_target: 0.8
          quality_targets: [0.8]
          clients_read: 1
          clients_write: 0
          clients_grid: [1]
          search_sweep:
            - {hnsw_ef: 32}
          rpc_baseline_requests: 5
          sla_threshold_ms: 50.0
          vector_dim: 12
          num_vectors: 120
          num_queries: 8
          top_k: 10
          warmup_s: 0.02
          steady_state_s: 0.02
          phase_timing_mode: strict
          phase_max_requests_per_phase: 12
          YAML

      - name: Generate legacy ground-truth smoke run artifacts
        run: |
          maxionbench run \
            --config ci_s1_legacy_ground_truth.yaml \
            --seed 41 \
            --repeats 1 \
            --no-retry \
            --output-dir artifacts/runs/ci_legacy_ground_truth

      - name: Drop ground-truth metadata fields to emulate legacy artifact
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          metadata_path = Path("artifacts/runs/ci_legacy_ground_truth/run_metadata.json")
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          metadata.pop("ground_truth_source", None)
          metadata.pop("ground_truth_metric", None)
          metadata.pop("ground_truth_k", None)
          metadata.pop("ground_truth_engine", None)
          metadata_path.write_text(json.dumps(metadata, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Assert strict validation fails for legacy ground-truth artifact
        run: |
          set +e
          output="$(maxionbench validate --input artifacts/runs/ci_legacy_ground_truth --strict-schema --json 2>&1)"
          status=$?
          set -e
          if [[ "${status}" -eq 0 ]]; then
            echo "Expected strict validation to fail for legacy ground-truth artifact"
            exit 1
          fi
          echo "${output}" | grep -q "missing ground truth metadata keys"

      - name: Capture legacy-compatible ground-truth validation warnings
        run: |
          maxionbench validate --input artifacts/runs/ci_legacy_ground_truth --legacy-ok --json \
            > artifacts/runs/ci_legacy_ground_truth/legacy_ok_validate.json
          cat artifacts/runs/ci_legacy_ground_truth/legacy_ok_validate.json

      - name: Assert report fails before regeneration
        run: |
          set +e
          output="$(maxionbench report --input artifacts/runs/ci_legacy_ground_truth --mode milestones --out artifacts/figures/ci_legacy_ground_truth 2>&1)"
          status=$?
          set -e
          if [[ "${status}" -eq 0 ]]; then
            echo "Expected report command to fail for legacy ground-truth artifact"
            exit 1
          fi
          echo "${output}" | grep -q "ground truth metadata"

      - name: Upload legacy ground-truth artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-legacy-ground-truth-artifacts
          if-no-files-found: warn
          retention-days: 7
          path: |
            ci_s1_legacy_ground_truth.yaml
            artifacts/runs/ci_legacy_ground_truth/**
            artifacts/figures/ci_legacy_ground_truth/**
